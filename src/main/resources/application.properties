spring.application.name=user-json-service

# ?? Database ?? values injected via environment variables ??????????????????
# LOCAL default (no SSL):
#   spring.datasource.url=jdbc:mysql://localhost:3306/profile_db?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
#
# DigitalOcean Managed MySQL (SSL required) ? set these env vars on App Platform:
#   DB_URL      = jdbc:mysql://db-mysql-nyc3-39242-do-user-36992248-0.h.db.ondigitalocean.com:25060/profile_db?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC
#   DB_USERNAME = doadmin
#   DB_PASSWORD = <your-db-password-from-do-dashboard>
spring.datasource.url=${DB_URL:jdbc:mysql://db-mysql-nyc3-39242-do-user-36992248-0.h.db.ondigitalocean.com:25060/profile_db?useSSL=true&requireSSL=true&allowPublicKeyRetrieval=true&serverTimezone=UTC&autoReconnect=true}
spring.datasource.username=${DB_USERNAME:doadmin}
spring.datasource.password=${DB_PASSWORD}

# Hibernate auto creates tables if they don't exist
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# Log DB connection attempts
logging.level.com.zaxxer.hikari=DEBUG
logging.level.org.springframework.jdbc=DEBUG

server.port=${PORT:8081}

# SOAP Service URL ? override with SOAP_SERVICE_URL env variable on Digital Ocean
# Example: SOAP_SERVICE_URL=http://192.34.59.227:8080
soap.service.url=${SOAP_SERVICE_URL:http://localhost:8080}